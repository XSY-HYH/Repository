<!DOCTYPE html>
<!-- 泥为什么要看代码！！！（恼） -->
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Directory Listing</title>
    <link rel="icon" type="image/x-icon" href="/api/log">
    <style>
        /* CSS will be injected here */
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Directory listing for {{currentPath}}</h1>
            <div class="header-actions">
                <div class="server-info">
                    <span id="serverName">Server</span> | <span id="currentTime">Current Time</span>
                </div>
            </div>
        </div>
        
        <table>
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Last Modified</th>
                    <th>Size</th>
                </tr>
            </thead>
            <tbody id="fileList">
                <tr><td colspan="3" class="empty">Loading...</td></tr>
            </tbody>
        </table>
    </div>
    

    <div id="previewModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title" id="previewFileName">文件预览</h2>
                <button class="close-btn">&times;</button>
            </div>
            <div class="modal-body">
                <div id="previewLoading">正在加载文件内容...</div>
                <div id="previewError" style="display: none;"></div>
                <div id="previewContent" style="display: none;"></div>
            </div>
            <div class="modal-footer">
                <button id="closePreviewBtn" class="btn btn-secondary">关闭</button>
            </div>
        </div>
    </div>
    
    <script>
        /* JavaScript will be injected here */
        
        document.addEventListener('DOMContentLoaded', function() {
            loadFileList();
        });
    </script>
</body>
</html>
